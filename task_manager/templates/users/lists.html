{% extends "base.html" %}
{% load django_bootstrap5 %}
{% load i18n %}

{% block table %}
<main class="container">
<table class="table table-striped">
  <thead>
    <tr>
      <th scope="col">ID</th>
      <th scope="col">{% trans 'Username' %}</th>
      <th scope="col">{% trans 'Fullname' %}</th>
      <th scope="col">{% trans 'Created at' %}</th>
      <th scope="col">{% trans 'Actions' %}</th>
    </tr>
  </thead>
  <tbody>
    {% for user in users %}
    <tr>
      <th scope="row">{{ user.id }}</th>
      <td>{{ user.title }}</td>
      <td>{{ user.description }}</td>
      <!-- Тут должны быть кнопки для удаления и изменения -->
      <td>#</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
</main>
{% endblock %}
